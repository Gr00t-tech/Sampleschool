<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School App - Teachers</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body {
      /* Gradient background */
      background: linear-gradient(135deg, #e0f7fa, #f4f6f9);
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: fadeInUp 0.8s ease both;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 500;
      color: #16a085;
      margin-bottom: 1.5rem;
    }

    p {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-weight: 600;
      color: #2c3e50;
    }

    .form-control {
      border-radius: 10px;
      padding: 0.75rem;
      border: 1px solid #ddd;
      transition: border-color 0.2s ease;
    }
    .form-control:focus {
      border-color: #16a085;
      box-shadow: 0 0 0 0.2rem rgba(22,160,133,0.25);
    }

    .btn-primary {
      background: linear-gradient(135deg, #16a085, #2980b9);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      padding: 0.75rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .btn-secondary {
      border-radius: 10px;
      font-weight: 500;
      padding: 0.65rem;
    }

    .alert {
      border-radius: 10px;
      font-size: 0.9rem;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('home') }}">School-App</a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('courses_page') }}">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('teachers_page') }}">Teachers</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('attendance') }}">Attendance</a></li>
          <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Page Content -->
  <div class="container mt-4">
    <h1 class="mb-3">Welcome {{ username }}!</h1>
    <h2 class="mb-4">Add Teacher</h2>
    <form method="POST" class="row g-3 mb-4">
      <div class="col-md-4">
        <input class="form-control" type="text" name="teacher" placeholder="Teacher Name" required>
      </div>
      <div class="col-md-4">
        <input class="form-control" type="text" name="subject" placeholder="Subject" required>
      </div>
      <div class="col-md-2">
        <button class="btn btn-primary w-100">Add Teacher</button>
      </div>
    </form>

    <!-- Teacher List Section -->
    <h2 class="mb-3">Teachers List</h2>
    <table class="table table-striped">
      <thead>
        <tr>
          <th>Teacher</th>
          <th>Subject</th>
          <th>Actions</th>
        </tr>
      </thead>
      <tbody>
        {% for teacher in teachers %}
        <tr>
          <td>{{ teacher.teacher }}</td>
          <td>{{ teacher.subject }}</td>
          <td>
            <a href="{{ url_for('edit_teacher', id=teacher.id) }}" class="btn btn-sm btn-warning">Edit</a>
            <form action="{{ url_for('delete_teacher', id=teacher.id) }}" method="POST" style="display:inline;">
              <button type="submit" class="btn btn-sm btn-danger">Delete</button>
            </form>
          </td>
        </tr>
        {% else %}
        <tr>
          <td colspan="3" class="text-center">No teachers added yet.</td>
        </tr>
        {% endfor %}
      </tbody>
    </table>
  </div>

  <!-- Bootstrap JS -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
