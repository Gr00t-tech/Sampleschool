<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sample School - Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
    body {
      background: #f4f6f9; /* soft neutral background */
      min-height: 100vh;
      margin: 0;
      font-family: 'Inter', 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: #ffffff;
      border-radius: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.1);
      padding: 2.5rem;
      width: 100%;
      max-width: 420px;
      animation: fadeInUp 0.8s ease both;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #2c3e50;
      margin-bottom: 0.5rem;
    }

    h2 {
      font-size: 1.2rem;
      font-weight: 500;
      color: #16a085;
      margin-bottom: 1.5rem;
    }

    p {
      color: #555;
      font-size: 0.95rem;
      margin-bottom: 1.5rem;
    }

    .form-label {
      font-weight: 600;
      color: #2c3e50;
    }

    .form-control {
      border-radius: 10px;
      padding: 0.75rem;
      border: 1px solid #ddd;
      transition: border-color 0.2s ease;
    }
    .form-control:focus {
      border-color: #16a085;
      box-shadow: 0 0 0 0.2rem rgba(22,160,133,0.25);
    }

    .btn-primary {
      background: linear-gradient(135deg, #16a085, #2980b9);
      border: none;
      border-radius: 10px;
      font-weight: 600;
      padding: 0.75rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 14px rgba(0,0,0,0.15);
    }

    .btn-secondary {
      border-radius: 10px;
      font-weight: 500;
      padding: 0.65rem;
    }

    .alert {
      border-radius: 10px;
      font-size: 0.9rem;
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="login-card text-center">
    <h1>School-App</h1>
    <h2>Admin Login</h2>
    <p>Please log in to continue</p>

    <!-- Login Form -->
    <form method="POST" action="{{ url_for('login') }}">
      <div class="mb-3 text-start">
        <label for="username" class="form-label">Username</label>
        <input type="text" class="form-control" id="username" name="username" required>
      </div>

      <div class="mb-3 text-start">
        <label for="password" class="form-label">Password</label>
        <input type="password" class="form-control" id="password" name="password" required>
      </div>

      {% if error %}
      <div class="alert alert-danger">{{ error }}</div>
      {% endif %}

      <button type="submit" class="btn btn-primary w-100">Login</button>
    </form>

    <a href="{{ url_for('resetpwd') }}" class="btn btn-secondary w-100 mt-3">Reset Password</a>
  </div>
</body>
</html>
