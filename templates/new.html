<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>School App - Navigation Hub</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css">
  <style>
body {
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  font-family: 'Poppins', sans-serif; /* modern, clean font */
  background: linear-gradient(135deg, #586880, #2c3e50); /* gradient for depth */
  color: #f5f5f5; /* light text for contrast */
}
    .card-container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
      width: 80%;
      max-width: 900px;
      margin: auto;
      padding-top: 40px;
    }
    .card {
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      text-align: center;
      padding: 40px 20px;
      text-decoration: none;
      color: #333;
      font-size: 18px;
      font-weight: bold;
      transition: transform 0.2s, background 0.2s;
    }
    .card:hover {
      transform: scale(1.05);
      background: #eaf4ff;
    }
    .welcome {
      text-align: center;
      margin-top: 20px;
      font-size: 22px;
      font-weight: bold;
      color: #6a9e86;
      text-shadow: 1px 1px 3px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <!-- ✅ Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-dark sticky-top">
    <div class="container-fluid">
      <a class="navbar-brand" href="{{ url_for('new_page') }}">School-App</a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav me-auto mb-2 mb-lg-0">
          <li class="nav-item"><a class="nav-link" href="/">Students</a></li>
          <li class="nav-item"><a class="nav-link" href="/">Courses</a></li>
          <li class="nav-item"><a class="nav-link" href="/">Teachers</a></li>
          <li class="nav-item"><a class="nav-link" href="/">Attendance</a></li>
          <li class="nav-item"><a class="nav-link" href="/">Logout</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ✅ Welcome message -->
  <div class="welcome">Welcome, {{ username }}!</div>

  <!-- ✅ Card-based navigation -->
  <div class="card-container">
    <a href="{{ url_for('home') }}" class="card">Students</a>
    <a href="{{ url_for('courses_page') }}" class="card">Courses</a>
    <a href="{{ url_for('teachers_page') }}" class="card">Teachers</a>
    <a href="{{ url_for('attendance') }}" class="card">Attendance</a>
    <a href="{{ url_for('logout') }}" class="card">Logout</a>
  </div>
</body>
</html>
