<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}School-App{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
      body {
      background-image: url('static/23.jpg')!important;
            background-attachment: fixed;
            background-size: cover;
            min-height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        h1, h2 {
            color: #477753;
            text-shadow: 1px 1px 3px rgba(143, 137, 137, 0.4);
            font-weight: 700;
        }

        /* Login card styling */
        .login-card {
            background: rgba(127, 130, 141, 0.95);
            border-radius: 12px;
            box-shadow: 0 6px 20px rgba(202, 202, 202, 0.25);
            padding: 2rem;
            width: 100%;
            max-width: 400px;
            animation: fadeInUp 0.8s ease both;
        }

        .form-control {
            border-radius: 8px;
            box-shadow: inset 0 1px 3px rgba(160, 158, 158, 0.1);
        }

        .btn-primary {
            background: linear-gradient(90deg, #3354ad, #0a6e6e);
            border: none;
            border-radius: 8px;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(179, 175, 175, 0.2);
        }

        .alert {
            border-radius: 8px;
            margin-bottom: 1rem;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <!-- ✅ Navbar only if logged in -->
    {% if session.get('logged_in') %}
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
      <div class="container-fluid">
        <a class="navbar-brand" href="{{ url_for('home') }}">School-App</a>
        <div class="collapse navbar-collapse">
          <ul class="navbar-nav me-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link" href="{{ url_for('home') }}">Home</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('courses_page') }}">Courses</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('teachers_page') }}">Teachers</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('attendance') }}">Attendance</a></li>
            <li class="nav-item"><a class="nav-link" href="{{ url_for('logout') }}">Logout</a></li>
          </ul>
        </div>
      </div>
    </nav>
    {% endif %}

    <!-- Page-specific content -->
    <div class="container mt-4">
    </div>

</body>
</html>
